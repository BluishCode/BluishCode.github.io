<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="keywords"
      content="educational, scotland, culture, music, literature, social"
    />
    <title>Clan Macleod Society USA</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo-area">
        <img src="images/holdfast.jpg" alt="Clan Macleod Crest" class="crest" />

        <div class="title-block">
          <h1>Clan Macleod Society, USA</h1>
          <p>Hold Fast</p>
        </div>

        <img
          src="images/luceononuro.jpg"
          alt="Clan Macleod Crest"
          class="crest"
        />
      </div>

      <button class="burger" id="burgerBtn">
        <span class="burger-highlight"> ☰</span>
      </button>

      <nav id="navMenu">Enable JS</nav>
    </header>

    <section class="hero">
      <div class="hero-overlay">
        <h2>Welcome Clan Macleod Members!</h2>
        <p>
          Use this page to login for member information. If you have forgotten
          your username or password, please get in touch with your regional vp.
        </p>
      </div>
    </section>

    <main class="main2">
      <section class="content-center">
        <form id="loginForm">
          <h2>Member Login</h2>
          <label for="email">Email: </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your Email"
            required
          /><br />
          <label for="password">Password: </label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your Password"
            required
          /><br />

          <button class="button" type="submit">Log In</button>
        </form>
    </main>

    <footer>
      <p>This is a test website made by Gavin Cloyd.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"> </script>
    <script src="js/login.js"> </script>
    <script src="js/script.js"></script>
    <script src="js/navbar.js"></script>
  </body>
</html>
