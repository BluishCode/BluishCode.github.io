<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="keywords"
      content="educational, scotland, culture, music, literature, social"
    />
    <title>Clan Macleod Society USA</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="hero">
      <div class="hero-overlay">
        <h2>Welcome Clan Macleod Members!</h2>
        <p>
          Use this page to login for member information. If you have forgotten
          your username or password, please get in touch with your regional vp.
        </p>
      </div>
    </section>

    <main class="main2">
      <section class="content-center">
        <form id="loginForm">
          <h2>Member Login</h2>
          <label for="email">Email: </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your Email"
            required
          /><br />
          <label for="password">Password: </label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your Password"
            required
          /><br />

          <button class="button" type="submit">Log In</button>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
